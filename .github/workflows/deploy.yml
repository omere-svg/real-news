name: Deploy to VM

# Deploy-on-push: whenever main changes, build in CI (plenty of RAM) and ship the
# compiled dist/ to the always-on VM (docs/DEPLOY-ORACLE-CLOUD.md), then restart the
# systemd service. The VM is tiny (~500MB RAM), so we deliberately NEVER compile there
# — building tsc on the box thrashes swap and can freeze it.
# Secrets: DEPLOY_SSH_KEY (private key), DEPLOY_HOST (VM public IP).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys race the same box.
concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      # Gate the deploy on the same checks as ci.yml — never ship code that
      # doesn't typecheck or fails tests.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Compile (in CI, not on the tiny VM)
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source on the VM (config, migrations, package.json)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "opc@${{ secrets.DEPLOY_HOST }}" 'bash -s' <<'EOF'
          set -euo pipefail
          cd ~/real-news
          BEFORE=$(git rev-parse HEAD)
          git fetch --quiet origin main
          git reset --hard origin/main
          AFTER=$(git rev-parse HEAD)
          echo "source: $BEFORE -> $AFTER"
          # Runtime deps only (no tsx/tsc needed on the box anymore). Reinstall when the
          # lockfile changed in this deploy, or on a manual re-run of the same commit
          # (BEFORE = AFTER, e.g. to repair node_modules) — npm ci is heavy on this small VM.
          if [ "$BEFORE" = "$AFTER" ] || git diff --name-only "$BEFORE" "$AFTER" | grep -qx 'package-lock.json'; then
            echo "running npm ci (prod deps only)"
            npm ci --omit=dev --no-audit --no-fund
          else
            echo "no lockfile change; skipping npm ci"
          fi
          EOF

      - name: Ship compiled dist/ to the VM (keep the previous build for rollback)
        run: |
          # Keep exactly one previous build as dist.prev so a failed health check
          # below can restore the last-known-good code instead of leaving the box dead.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "opc@${{ secrets.DEPLOY_HOST }}" 'bash -s' <<'EOF'
          set -euo pipefail
          cd ~/real-news
          rm -rf dist.prev
          if [ -d dist ]; then mv dist dist.prev; fi
          EOF
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -r dist "opc@${{ secrets.DEPLOY_HOST }}:~/real-news/"

      - name: Restart service + health check (rollback on failure)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "opc@${{ secrets.DEPLOY_HOST }}" 'bash -s' <<'EOF'
          set -euo pipefail

          wait_healthy() {
            for i in $(seq 1 24); do
              if curl -fsS -m 5 http://127.0.0.1:3000/health >/dev/null 2>&1; then
                echo "health OK after $((i*3))s"
                return 0
              fi
              sleep 3
            done
            return 1
          }

          # Restart applies any pending DB migrations on boot (main.ts calls migrate()).
          sudo systemctl restart horizon
          # Wait for boot + migrations + server to come up (slow 1-core box); fail the
          # deploy only if it never becomes healthy within the window.
          if wait_healthy; then
            exit 0
          fi

          echo "service did not become healthy in time; recent logs:"
          sudo journalctl -u horizon --no-pager -n 40 --output=cat
          sudo systemctl is-active horizon || true

          # Roll back to the previous build so a bad deploy never leaves the box dead.
          # Note: any DB migrations the new build applied on boot are NOT reverted.
          if [ -d ~/real-news/dist.prev ]; then
            echo "ROLLBACK: restoring previous dist and restarting"
            rm -rf ~/real-news/dist
            mv ~/real-news/dist.prev ~/real-news/dist
            sudo systemctl restart horizon
            if wait_healthy; then
              echo "ROLLBACK SUCCEEDED: previous build is serving again (deploy still failed)"
            else
              echo "ROLLBACK FAILED: previous build did not become healthy either; recent logs:"
              sudo journalctl -u horizon --no-pager -n 40 --output=cat
            fi
          else
            echo "no dist.prev present — nothing to roll back to"
          fi
          exit 1
          EOF
