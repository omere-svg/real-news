# Project Horizon configuration (ADR-0003). Validated against src/config/schema.ts
# at boot. Secrets (OPENAI_API_KEY, TELEGRAM_BOT_TOKEN) live in .env, never here.

# The background loop wakes this often. "Every X minutes" (ADR-0001).
# Kept comfortably above a tick's wall-time; a re-entrancy guard also prevents
# overlapping ticks if one ever runs long (ADR-0038).
tickIntervalMinutes: 20

# Sources to extract from each tick (ADR-0004). Strictly official public APIs.
# maxItems kept modest so per-tick LLM cost stays low; raise per source as needed.
sources:
  - id: hackernews      # global tech / AI — Tier C (popularity, not authority; ADR-0034)
    enabled: true
    weight: 0.35
    maxItems: 30
  - id: arxiv           # AI / research
    enabled: true
    weight: 0.55
    maxItems: 20
  - id: gdelt           # geopolitics / world news (1 req / 5s limit)
    enabled: true
    weight: 0.7
    maxItems: 25
  - id: knesset         # Israeli politics (official Knesset OData)
    enabled: true
    weight: 0.7
    maxItems: 20
  - id: secedgar        # finance (US 8-K filings)
    enabled: true
    weight: 0.65
    maxItems: 20
  - id: wikipedia       # general / current events
    enabled: true
    weight: 0.6
    maxItems: 20
  - id: datagovil       # weak (datasets, not events) — no adapter yet
    enabled: false
    weight: 0.5
    maxItems: 30
  # Phase 4 — media + thematic anchors (ADR-0021). Keyless RSS / open APIs.
  - id: guardian        # global mainstream media (world section ⇒ Geopolitics)
    enabled: true
    weight: 0.5
    maxItems: 20
  - id: timesofisrael   # Israel-local mainstream media (English)
    enabled: true
    weight: 0.5
    maxItems: 20
  - id: knesset-votes   # recorded Knesset vote tallies (for/against/abstain)
    enabled: true
    weight: 0.7
    maxItems: 20
  - id: hf-papers       # Hugging Face Daily Papers — trending AI (upvotes/comments); Tier C
    enabled: true
    weight: 0.45
    maxItems: 20
  - id: nber            # NBER working papers — academic economics
    enabled: true
    weight: 0.7
    maxItems: 15
  - id: nature          # Nature — top-journal science headlines
    enabled: true
    weight: 0.65
    maxItems: 15
  - id: psyarxiv        # PsyArXiv — psychology/behavioral-science preprints
    enabled: true
    weight: 0.55
    maxItems: 15
  # ADR-0031 — keyless wave: Sports, Health, Climate (all keyless, caching-legal).
  - id: thesportsdb    # Sports — prior-day match results/scores (keyless demo key)
    enabled: true
    weight: 0.4
    maxItems: 20
  - id: who-outbreaks  # Health — WHO Disease Outbreak News (authoritative)
    enabled: true
    weight: 0.75
    maxItems: 15
  - id: nasa-eonet     # Climate — natural events (storms, wildfires, volcanoes)
    enabled: true
    weight: 0.65
    maxItems: 20
  - id: usgs-quakes    # Climate — significant earthquakes (M4.5+, severity signal)
    enabled: true
    weight: 0.7
    maxItems: 20
  - id: gdacs          # Climate — global disaster alerts (RSS, severity-scored)
    enabled: true
    weight: 0.65
    maxItems: 20
  # Phase 4 — numeric Signal sources (ADR-0025). Feed significance, never a story.
  - id: wikipedia-pageviews  # cross-lingual reader attention (en⇒World, he⇒Israel)
    enabled: true
    weight: 0.5
    maxItems: 100
  - id: worldbank            # macro volatility (GDP growth, inflation) ⇒ World/Business
    enabled: true
    weight: 0.5
    maxItems: 8
  # ADR-0031 — keyless Signal sources: Business + Science depth.
  - id: coingecko            # crypto 24h price-momentum ⇒ Business signal
    enabled: true
    weight: 0.5
    maxItems: 25
  - id: frankfurter          # major-pair FX daily volatility ⇒ Business signal
    enabled: true
    weight: 0.5
    maxItems: 3
  - id: openalex             # recent-research citation impact ⇒ Science signal
    enabled: true
    weight: 0.5
    maxItems: 25

# The Reasoner tiers (ADR-0006/0012). OpenAI models — change to any your key can access.
reasoner:
  cheapModel: gpt-4o-mini
  deepModel: gpt-4o
  deepAnalysisTopN: 10
  backfillMaxOnBoot: 500   # heal more of the cache on boot (ADR-0038); now parallel (ADR-0039)
  backfillPerTick: 12      # steady-state: heal summary/why-null stories each tick, parallel (ADR-0038/0039)

# Dedup embeddings (ADR-0018). `openai` is neural with a hashing fallback;
# `hashing` is fully offline / zero-cost. dimensions also sets the fallback width.
embedder:
  provider: openai
  model: text-embedding-3-small
  dimensions: 1536

# Dedup: within-tick (ADR-0007) and cross-tick (ADR-0017).
dedup:
  candidateThreshold: 0.78
  recentWindowHours: 72   # how far back a developing story can accrete corroboration
  crossTopic: true        # resolve same-event stories even when classified into different Topics (ADR-0038)
  confirmConcurrency: 8   # in-flight LLM confirm calls in cluster/resolve — keeps a tick fast (ADR-0038)
  # Entity-aware blocking (ADR-0036): pairs sharing >= minSharedEntities named
  # entities only need to clear relaxedThreshold. Set enabled:false to revert to
  # pure cosine; tune the knobs if it over-merges or adds too many confirm calls.
  entityBlocking:
    enabled: true
    relaxedThreshold: 0.66
    minSharedEntities: 1

# Significance scoring (ADR-0008/0034 — impact-first).
scoring:
  recencyHalfLifeHours: 36    # floored recency factor decays one step per this (ADR-0034)
  maxSignalAdjustment: 1.0    # max numeric-Signal nudge to significance (ADR-0025)

# Telegram bot interface (ADR-0019/0020). Token in .env (TELEGRAM_BOT_TOKEN), never here.
# Off by default; set enabled: true to run the bot alongside the tick loop + viewer.
telegram:
  enabled: true
  pollTimeoutSeconds: 30
  naturalLanguage: true   # understand plain-language messages + buttons, not just slash commands (ADR-0030)
  allowedChatIds: []      # empty + openAccess:true = anyone can use the bot (ADR-0031)
  openAccess: true        # OPEN to everyone; cost is bounded by the limits below
  limits:                 # rate limits + cost quotas (ADR-0022/0031)
    perMinute: 6          # burst: max commands per chat per minute
    podcastPerDay: 2      # per-chat daily cap on the expensive podcast path (TTS+LLM)
    commandsPerDay: 100   # per-chat daily cap on all commands (incl. chat questions)
    globalPodcastPerDay: 15    # process-wide podcast ceiling per day (hard bill backstop)
    globalCommandsPerDay: 200  # process-wide command ceiling per day across ALL users —
                               # the total daily spend cap that makes open access safe (ADR-0031)
  tts:
    enabled: true         # podcast as audio; false sends the script as text
    model: gpt-4o-mini-tts
    voice: alloy
  chat:                   # chat about the news (ADR-0029)
    enabled: true         # free-text questions after a brief, /chat, /ask
    webSearch:            # fallback when the cache can't answer
      provider: none      # none = cache-only (Principle 4); tavily = live lookup (needs TAVILY_API_KEY)
      maxResults: 5

# Source fetch hardening (ADR-0023): bound time and response size per request.
http:
  fetchTimeoutMs: 10000
  maxResponseBytes: 5000000

# Presentation / query layer (ADR-0013/0014/0015). Attention budgeting + preferences.
presentation:
  # Default attention budget and preferences, applied when a request omits them.
  defaultMinutes: 3
  maxMinutes: 60            # hard cap on requested minutes (cost guard, ADR-0023)
  maxPodcastMinutes: 20     # tighter cap for podcasts (TTS cost guard) — clamps the audio path
  webPodcastEnabled: false  # expose the LLM-backed /api/podcast on the web (ADR-0023)
  # Readability floor (ADR-0024): prefer few, fully-explained stories over many headlines.
  minDepth: full           # headline | brief | full — minimum depth every story gets
  minStories: 3            # always show at least this many, even at /brief 1
  maxStories: 12           # never more than this — bounds large-minute briefs (ADR-0024)
  preferredTopics:
    - AI
    - Geopolitics
  # Budget cost model (ADR-0013): delivery rates and per-depth word costs.
  textWordsPerMinute: 220   # reading rate (brief, outline)
  audioWordsPerMinute: 150  # speaking rate (podcast script)
  candidatePool: 200        # how many top Stories to consider per request
  wordCost:
    headline: 18
    brief: 45
    full: 95
