# Run Project Horizon as a always-on daemon on any VM with Docker (ADR-0031 /
# docs/DEPLOY-ORACLE-CLOUD.md). Unlike a free PaaS, a VM doesn't sleep and has no
# bandwidth cap, so the tick loop runs 24/7.
#
#   docker compose up -d --build      # start (rebuild on code changes)
#   docker compose logs -f            # watch the tick loop
#   docker compose down               # stop
#
# Secrets come from a local .env (never committed): OPENAI_API_KEY,
# TELEGRAM_BOT_TOKEN, DB_URL (Turso libsql://…), DB_AUTH_TOKEN. See .env.example.
services:
  horizon:
    build: .
    image: project-horizon
    container_name: horizon
    # Restart on crash AND on VM reboot (with the Docker service enabled on boot).
    restart: unless-stopped
    env_file: .env
    environment:
      # Bind all interfaces so the viewer is reachable if you open the port below;
      # harmless for the Telegram bot, which needs no inbound traffic.
      HOST: 0.0.0.0
      PORT: 3000
    # Publish the read-only viewer / API. OPTIONAL — only needed if you want to
    # reach http://<vm-ip>:3000. If you only use the Telegram bot, delete this
    # block (the bot works over outbound long-poll, no inbound port required).
    ports:
      - '3000:3000'
    # Node 22 ships a global fetch, so the health probe needs no extra tooling.
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
